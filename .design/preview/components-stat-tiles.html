<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .tile{background:var(--bg-1);border:1px solid var(--line-1);border-radius:var(--r-tile);padding:16px;box-shadow:var(--shadow-card)}
  .lab{font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--fg-2)}
  .v{font-family:var(--font-display);font-weight:700;font-size:30px;color:#fff;margin-top:10px}
  .u{font-size:15px;color:var(--fg-2)}
  .link{font-size:11px;font-weight:700;margin-top:8px}
</style></head><body>
  <div class="tile"><div class="lab">HRV · Average</div><div class="v">62<span class="u"> ms</span></div><div class="link" style="color:var(--blue)">Inputs →</div></div>
  <div class="tile"><div class="lab">Resting HR</div><div class="v">48<span class="u"> bpm</span></div><div class="link" style="color:var(--red)">Inputs →</div></div>
</body></html>
