<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui)}
  .lab{font-weight:700;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--fg-2);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:14px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px}
  .material-symbols-rounded{font-size:30px;color:var(--fg-1)}
  .ic span.t{font-family:var(--font-mono);font-size:9px;color:var(--fg-3)}
</style></head><body>
  <div class="lab">Material Symbols (Rounded, filled) — faithful to the Compose Material Icons in source</div>
  <div class="grid">
    <div class="ic"><span class="material-symbols-rounded" style="color:var(--green)">ecg_heart</span><span class="t">today</span></div>
    <div class="ic"><span class="material-symbols-rounded" style="color:var(--blue)">bedtime</span><span class="t">sleep</span></div>
    <div class="ic"><span class="material-symbols-rounded">monitoring</span><span class="t">trends</span></div>
    <div class="ic"><span class="material-symbols-rounded" style="color:var(--yellow)">exercise</span><span class="t">workouts</span></div>
    <div class="ic"><span class="material-symbols-rounded">watch</span><span class="t">device</span></div>
    <div class="ic"><span class="material-symbols-rounded" style="color:var(--red)">favorite</span><span class="t">hr</span></div>
    <div class="ic"><span class="material-symbols-rounded" style="color:var(--blue)">bolt</span><span class="t">strain</span></div>
    <div class="ic"><span class="material-symbols-rounded">bluetooth_connected</span><span class="t">ble</span></div>
    <div class="ic"><span class="material-symbols-rounded">battery_full</span><span class="t">battery</span></div>
    <div class="ic"><span class="material-symbols-rounded">air</span><span class="t">resp</span></div>
    <div class="ic"><span class="material-symbols-rounded">device_thermostat</span><span class="t">temp</span></div>
    <div class="ic"><span class="material-symbols-rounded">water_drop</span><span class="t">spo2</span></div>
    <div class="ic"><span class="material-symbols-rounded">alarm</span><span class="t">alarm</span></div>
    <div class="ic"><span class="material-symbols-rounded">sync</span><span class="t">sync</span></div>
  </div>
</body></html>
