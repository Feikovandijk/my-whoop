<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .band{border-radius:var(--r-tile);padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--bg-1);border:1px solid var(--line-1)}
  .ring{width:54px;height:54px;border-radius:50%;display:grid;place-items:center}
  .ring span{font-family:var(--font-display);font-weight:700;font-size:20px;color:#fff}
  .pct{font-family:var(--font-display);font-weight:700;font-size:34px;line-height:1}
  .nm{font-size:12px;color:var(--fg-2);font-weight:600}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px}
</style></head><body>
  <div class="row">
    <div class="band">
      <div class="ring" style="background:conic-gradient(var(--green) 0 84%,#1F262C 84% 100%)"><span style="background:var(--bg-1);width:38px;height:38px;border-radius:50%;display:grid;place-items:center">84</span></div>
      <div><div class="pct" style="color:var(--green)">HIGH</div><div class="nm">Recovery ≥ 67%</div><div class="hex">#2BF07A</div></div>
    </div>
    <div class="band">
      <div class="ring" style="background:conic-gradient(var(--yellow) 0 52%,#1F262C 52% 100%)"><span style="background:var(--bg-1);width:38px;height:38px;border-radius:50%;display:grid;place-items:center">52</span></div>
      <div><div class="pct" style="color:var(--yellow)">MID</div><div class="nm">Recovery 34–66%</div><div class="hex">#FFD23F</div></div>
    </div>
    <div class="band">
      <div class="ring" style="background:conic-gradient(var(--red) 0 22%,#1F262C 22% 100%)"><span style="background:var(--bg-1);width:38px;height:38px;border-radius:50%;display:grid;place-items:center">22</span></div>
      <div><div class="pct" style="color:var(--red)">LOW</div><div class="nm">Recovery &lt; 34%</div><div class="hex">#FF4D6A</div></div>
    </div>
  </div>
</body></html>
