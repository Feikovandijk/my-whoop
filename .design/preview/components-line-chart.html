<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui)}
  .card{background:var(--bg-1);border:1px solid var(--line-1);border-radius:var(--r-tile);padding:16px}
  .lab{font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--fg-2)}
  .v{font-family:var(--font-display);font-weight:700;font-size:24px;color:#fff;margin:6px 0 12px}
</style></head><body>
  <div class="card">
    <div class="lab">Historical HRV · 30d</div>
    <div class="v">Avg 61 <span style="font-size:14px;color:var(--fg-2)">ms</span></div>
    <svg width="100%" height="120" viewBox="0 0 620 120" preserveAspectRatio="none">
      <line x1="0" y1="30" x2="620" y2="30" stroke="rgba(255,255,255,.04)"/>
      <line x1="0" y1="60" x2="620" y2="60" stroke="rgba(255,255,255,.04)"/>
      <line x1="0" y1="90" x2="620" y2="90" stroke="rgba(255,255,255,.04)"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2C9BFF" stop-opacity=".25"/><stop offset="1" stop-color="#2C9BFF" stop-opacity="0"/></linearGradient></defs>
      <path d="M0 80 L88 60 L176 72 L264 40 L352 56 L440 30 L528 48 L620 36 L620 120 L0 120 Z" fill="url(#g)"/>
      <path d="M0 80 L88 60 L176 72 L264 40 L352 56 L440 30 L528 48 L620 36" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="var(--blue)"><circle cx="264" cy="40" r="4"/><circle cx="440" cy="30" r="4"/><circle cx="620" cy="36" r="4"/></g>
    </svg>
  </div>
</body></html>
