<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .sw{border-radius:var(--r-tile);overflow:hidden;border:1px solid var(--line-1)}
  .chip{height:64px}
  .meta{padding:10px 12px;background:var(--bg-1)}
  .nm{font-size:12px;font-weight:700;color:var(--fg-1)}
  .role{font-size:10px;color:var(--fg-3);margin-top:1px}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);margin-top:4px}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green)"></div><div class="meta"><div class="nm">Green</div><div class="role">recovery · brand</div><div class="hex">#2BF07A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue)"></div><div class="meta"><div class="nm">Blue</div><div class="role">strain · sleep</div><div class="hex">#2C9BFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal)"></div><div class="meta"><div class="nm">Teal</div><div class="role">accent</div><div class="hex">#2EE6C6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--purple)"></div><div class="meta"><div class="nm">Purple</div><div class="role">REM</div><div class="hex">#A66BFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--indigo)"></div><div class="meta"><div class="nm">Indigo</div><div class="role">deep sleep</div><div class="hex">#3D5AFE</div></div></div>
  </div>
</body></html>
