<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:24px;font-family:var(--font-ui);display:flex;gap:18px;align-items:flex-end}
  .b{background:var(--bg-2);border:1px solid var(--line-2);display:grid;place-items:center;color:var(--fg-2);font-family:var(--font-mono);font-size:10px}
  .cap{font-size:10px;color:var(--fg-3);text-align:center;margin-top:8px}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
  <div class="col"><div class="b" style="width:96px;height:64px;border-radius:var(--r-card)">20</div><div class="cap">card 20px</div></div>
  <div class="col"><div class="b" style="width:84px;height:60px;border-radius:var(--r-tile)">16</div><div class="cap">tile 16px</div></div>
  <div class="col"><div class="b" style="width:72px;height:52px;border-radius:var(--r-input)">12</div><div class="cap">input 12px</div></div>
  <div class="col"><div class="b" style="width:120px;height:34px;border-radius:var(--r-chip)">999</div><div class="cap">chip / pill</div></div>
</body></html>
