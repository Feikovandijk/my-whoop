<!-- @dsCard group="Type" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:24px;font-family:var(--font-ui)}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--line-1)}
  .row:last-child{border:0}
  .v{font-family:var(--font-display);font-weight:700;font-variant-numeric:tabular-nums;color:var(--fg-1)}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto}
  .u{color:var(--fg-2);font-size:.5em}
</style></head><body>
  <div class="row"><div class="v" style="font-size:88px;line-height:.9">88<span class="u">px</span></div><span class="spec">.ow-hero · recovery %</span></div>
  <div class="row"><div class="v" style="font-size:44px">14.2 <span class="u">strain</span></div><span class="spec">.ow-stat · 44px</span></div>
  <div class="row"><div class="v" style="font-size:30px">62 <span class="u">ms hrv</span></div><span class="spec">.ow-stat-sm · 30px</span></div>
</body></html>
