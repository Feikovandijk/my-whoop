<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:24px;font-family:var(--font-ui)}
  .lab{font-weight:700;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--fg-2);margin-bottom:16px}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:14px;background:var(--green);border-radius:3px}
  .n{width:96px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head><body>
  <div class="lab">Spacing scale · 4px base</div>
  <div class="row"><span class="n">s-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="n">s-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="n">s-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="n">s-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="n">s-5 · 20</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="n">s-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="n">s-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="n">s-10 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="n">s-12 · 48</span><div class="bar" style="width:48px"></div></div>
</body></html>
