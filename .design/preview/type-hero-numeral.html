<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:24px;font-family:var(--font-ui);display:flex;align-items:center;gap:32px}
  .big{font-family:var(--font-display);font-weight:700;font-size:120px;line-height:.82;color:var(--green);letter-spacing:-1px;font-variant-numeric:tabular-nums}
  .meta .nm{font-size:14px;color:var(--fg-1);font-weight:700}
  .meta .sub{font-size:12px;color:var(--fg-3);margin-top:4px;line-height:1.5}
  .glyphs{font-family:var(--font-display);font-weight:700;font-size:30px;color:var(--fg-2);margin-top:12px;letter-spacing:1px}
</style></head><body>
  <div class="big">84<span style="font-size:54px;color:var(--fg-2)">%</span></div>
  <div class="meta">
    <div class="nm">Saira Condensed · 700</div>
    <div class="sub">Hero numerals — recovery %, strain,<br>live BPM. Tabular, scoreboard-athletic.</div>
    <div class="glyphs">0123456789</div>
  </div>
</body></html>
