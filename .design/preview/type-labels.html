<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:24px;font-family:var(--font-ui)}
  .lab{font-weight:700;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--fg-2)}
  .lab.g{color:var(--green)}.lab.b{color:var(--blue)}
  .grp{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:18px}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px}
  .cap{font-weight:500;font-size:12px;color:var(--fg-3);margin-top:14px}
</style></head><body>
  <div class="grp">
    <span class="lab">RECOVERY</span><span class="lab">DAY STRAIN</span><span class="lab">LIVE BPM</span><span class="lab g">CONNECTED</span><span class="lab b">BONDED</span>
  </div>
  <div class="spec">.ow-label — Archivo 700 / 11px / +1.4px tracking / uppercase &nbsp;·&nbsp; the system's signature micro-label</div>
  <div class="cap">Strain is cardiovascular load only until calibrated against WHOOP reference data.</div>
  <div class="spec">.ow-caption — Archivo 500 / 12px / fg-3</div>
</body></html>
