<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg-0);padding:22px;font-family:var(--font-ui)}
  .label{font-weight:700;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px}
  .stage{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .nm{width:90px;font-size:12px;color:var(--fg-1);font-weight:600}
  .bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.05)}
  .bar>div{height:100%;border-radius:4px}
  .dur{width:54px;text-align:right;font-family:var(--font-display);font-weight:700;font-size:15px}
  .hex{width:64px;text-align:right;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head><body>
  <div class="label">Sleep stages</div>
  <div class="stage"><div class="nm">Deep (SWS)</div><div class="bar"><div style="width:24%;background:var(--stage-deep)"></div></div><div class="dur" style="color:var(--stage-deep)">1h28</div><div class="hex">#3D5AFE</div></div>
  <div class="stage"><div class="nm">REM</div><div class="bar"><div style="width:31%;background:var(--stage-rem)"></div></div><div class="dur" style="color:var(--stage-rem)">1h54</div><div class="hex">#A66BFF</div></div>
  <div class="stage"><div class="nm">Light</div><div class="bar"><div style="width:52%;background:var(--stage-light)"></div></div><div class="dur" style="color:var(--stage-light)">3h12</div><div class="hex">#2C9BFF</div></div>
  <div class="stage"><div class="nm">Awake</div><div class="bar"><div style="width:8%;background:var(--stage-awake)"></div></div><div class="dur" style="color:var(--stage-awake)">11m</div><div class="hex">#FF4D6A</div></div>
</body></html>
