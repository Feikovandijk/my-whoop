<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenWhoop — Android</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(900px 600px at 50% -10%, rgba(44,155,255,0.10), transparent 60%),
      radial-gradient(700px 500px at 50% 110%, rgba(43,240,122,0.08), transparent 60%),
      #050608;
    display: grid; place-items: center; padding: 24px;
    font-family: var(--font-ui);
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  .material-symbols-rounded {
    font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }
  button { font-family: var(--font-ui); }
  @keyframes owpulse { 0% { transform: scale(0.78); opacity: 0.9; } 100% { transform: scale(1.28); opacity: 0; } }
  .ow-pulse { animation: owpulse 1300ms cubic-bezier(0.16,1,0.3,1) infinite; }
  @keyframes owfade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .ow-fade { animation: owfade 280ms ease-out; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="TodayScreen.jsx"></script>
  <script type="text/babel" src="SleepScreen.jsx"></script>
  <script type="text/babel" src="TrendsScreen.jsx"></script>
  <script type="text/babel" src="WorkoutsScreen.jsx"></script>
  <script type="text/babel" src="DeviceScreen.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
